name: Build StarrySkyForm

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup XMake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Configure XMake
        run: xmake f -y -m release

      - name: Build
        run: xmake -y

      - name: Package
        run: |
          mkdir -p release/StarrySkyForm
          cp -r assets/* release/StarrySkyForm/
          cp bin/StarrySkyForm/*.dll release/StarrySkyForm/
          cp README.md release/StarrySkyForm/
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StarrySkyForm-${{ github.sha }}
          path: release/StarrySkyForm/

      - name: Create Release
        if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: release/StarrySkyForm/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
