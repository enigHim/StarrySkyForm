name: Build StarrySkyForm

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup XMake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Check tools
        shell: cmd
        run: |
          echo "Checking xmake..."
          xmake --version
          echo "Checking cl..."
          cl 2>&1 || echo "cl not found"
          echo "Checking git..."
          git --version

      - name: Configure
        shell: cmd
        run: |
          xmake f -y -m release --vs_runtime=MD -vD 2>&1

      - name: Build
        shell: cmd
        run: |
          xmake -y -vD 2>&1

      - name: Package
        shell: pwsh
        run: |
          if (Test-Path bin/StarrySkyForm/*.dll) {
            New-Item -ItemType Directory -Force -Path release/StarrySkyForm
            Copy-Item -Path assets/* -Destination release/StarrySkyForm/ -Recurse -Force
            Copy-Item -Path bin/StarrySkyForm/*.dll -Destination release/StarrySkyForm/ -Force
            Copy-Item -Path README.md -Destination release/StarrySkyForm/ -Force
          } else {
            echo "No DLL found, checking bin directory..."
            Get-ChildItem -Path bin -Recurse
          }

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: StarrySkyForm-build
          path: |
            bin/
            release/
