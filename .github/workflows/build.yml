on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        target_type:
          - server
    steps:
      - uses: actions/checkout@v6

      - uses: xmake-io/github-action-setup-xmake@v1

      - uses: actions/cache@v5
        with:
          path: |
            ~/AppData/Local/.xmake
          key: xmake-${{ hashFiles('xmake.lua') }}
          restore-keys: |
            xmake-

      - run: |
          xmake repo -u

      - run: |
          xmake f -a x64 -m release -p windows -v --target_type=${{ matrix.target_type }} -y

      - run: |
          xmake -v -y

      - name: Package
        if: matrix.target_type == 'server'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release/StarrySkyForm
          Copy-Item -Path assets/* -Destination release/StarrySkyForm/ -Recurse -Force
          $dll = Get-ChildItem -Path bin -Filter "StarrySkyForm.dll" -Recurse | Select-Object -First 1
          if ($dll) { Copy-Item -Path $dll.FullName -Destination release/StarrySkyForm/ }
          Copy-Item -Path README.md -Destination release/StarrySkyForm/

      - uses: actions/upload-artifact@v7
        with:
          name: StarrySkyForm-${{ github.sha }}-${{ matrix.target_type }}-windows-x64
          path: |
            release/
