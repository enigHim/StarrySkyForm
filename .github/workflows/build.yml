name: Build StarrySkyForm

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup XMake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: xmake f -y -m release --vs_runtime=MD

      - name: Build
        run: xmake -y -v

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release/StarrySkyForm
          Copy-Item -Path assets/* -Destination release/StarrySkyForm/ -Recurse -Force
          Copy-Item -Path bin/StarrySkyForm/*.dll -Destination release/StarrySkyForm/ -Force
          Copy-Item -Path README.md -Destination release/StarrySkyForm/ -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StarrySkyForm
          path: release/StarrySkyForm/
