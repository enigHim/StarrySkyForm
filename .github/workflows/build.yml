name: Build StarrySkyForm

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone LeviLamina SDK
        run: |
          git clone --depth 1 https://github.com/LiteLDev/LeviLamina.git levilamina-sdk

      - name: Setup XMake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure with local SDK
        env:
          LEVILAMINA_SDK_DIR: ${{ github.workspace }}/levilamina-sdk
        run: |
          xmake f -y -m release --sdk=${{ github.workspace }}/levilamina-sdk

      - name: Build
        run: xmake -y

      - name: List Output
        shell: pwsh
        run: |
          Get-ChildItem -Path bin -Recurse -ErrorAction SilentlyContinue

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release/StarrySkyForm
          Copy-Item -Path assets/* -Destination release/StarrySkyForm/ -Recurse -Force
          $dll = Get-ChildItem -Path bin -Filter "StarrySkyForm.dll" -Recurse | Select-Object -First 1
          if ($dll) { Copy-Item -Path $dll.FullName -Destination release/StarrySkyForm/ }
          Copy-Item -Path README.md -Destination release/StarrySkyForm/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StarrySkyForm
          path: release/StarrySkyForm/
